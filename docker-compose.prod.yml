version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    container_name: autobgv_caddy
    restart: unless-stopped
    environment:
      SERVER_DOMAIN: ${SERVER_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - agent-service
    networks:
      - autobgv_network

  workflow-service:
    build:
      context: ./services/workflow
      dockerfile: Dockerfile
    container_name: autobgv_workflow_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-autobgv}:${POSTGRES_PASSWORD:-autobgv_secret}@postgres:5432/${POSTGRES_DB:-autobgv}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      SERVICE_NAME: workflow-service
      SERVICE_PORT: 8001
      CORS_ORIGINS: "https://${SERVER_DOMAIN},http://${SERVER_DOMAIN},http://localhost:3000,http://frontend:3000"
      SESSION_CREATED_QUEUE: ${SESSION_CREATED_QUEUE:-queue:agent:session.created}
    expose:
      - "8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - autobgv_network

  agent-service:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    container_name: autobgv_agent_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-autobgv}:${POSTGRES_PASSWORD:-autobgv_secret}@postgres:5432/${POSTGRES_DB:-autobgv}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      QUEUE_REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      WORKFLOW_SERVICE_URL: http://workflow-service:8001
      SERVICE_NAME: agent-service
      SERVICE_PORT: 8002
      CORS_ORIGINS: "https://${SERVER_DOMAIN},http://${SERVER_DOMAIN},http://localhost:3000,http://frontend:3000"
      AGENT_SERVICE_BASE_URL: https://${SERVER_DOMAIN}
      SESSION_CREATED_QUEUE: ${SESSION_CREATED_QUEUE:-queue:agent:session.created}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:-}
      TWILIO_WHATSAPP_CONTENT_SID: ${TWILIO_WHATSAPP_CONTENT_SID:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-autobgv-media}
    expose:
      - "8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - autobgv_network

  verification-service:
    build:
      context: ./services/verification
      dockerfile: Dockerfile
    container_name: autobgv_verification_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-autobgv}:${POSTGRES_PASSWORD:-autobgv_secret}@postgres:5432/${POSTGRES_DB:-autobgv}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
      WORKFLOW_SERVICE_URL: http://workflow-service:8001
      SERVICE_NAME: verification-service
      SERVICE_PORT: 8003
    expose:
      - "8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - autobgv_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: autobgv_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_WORKFLOW_SERVICE_URL: http://workflow-service:8001
      NEXT_PUBLIC_AGENT_SERVICE_URL: http://agent-service:8002
      NEXT_PUBLIC_VERIFICATION_SERVICE_URL: http://verification-service:8003
      NEXT_PUBLIC_CLIENT_ID: client_001
    expose:
      - "3000"
    depends_on:
      - workflow-service
    networks:
      - autobgv_network

  postgres:
    image: postgres:16-alpine
    container_name: autobgv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autobgv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autobgv_secret}
      POSTGRES_DB: ${POSTGRES_DB:-autobgv}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autobgv}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autobgv_network

  redis:
    image: redis:7-alpine
    container_name: autobgv_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autobgv_network

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  autobgv_network:
    driver: bridge
    name: autobgv_network
