version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: autobgv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autobgv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autobgv_secret}
      POSTGRES_DB: ${POSTGRES_DB:-autobgv}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autobgv}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autobgv_network

  redis:
    image: redis:7-alpine
    container_name: autobgv_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autobgv_network

  minio:
    image: minio/minio:latest
    container_name: autobgv_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - autobgv_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  autobgv_network:
    driver: bridge
    name: autobgv_network
